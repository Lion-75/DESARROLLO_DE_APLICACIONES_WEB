{% extends "base.html" %}

{% block title %}Editar Libro{% endblock %}

{% block content %}
<h2>Editar Libro</h2>
<form method="post">
    <label>Título:</label><br>
    <input type="text" name="titulo" value="{{ libro.titulo }}" required><br><br>
    <label>Autor:</label><br>
    <input type="text" name="autor" value="{{ libro.autor }}" required><br><br>
    <label>Cantidad:</label><br>
    <input type="number" name="cantidad" value="{{ libro.cantidad }}" required><br><br>
    <label>Precio:</label><br>
    <input type="number" step="0.01" name="precio" value="{{ libro.precio }}" required><br><br>
    <input type="submit" value="Actualizar">
</form>
<br>
<a href="{{ url_for('mysql_ver') }}">Cancelar</a>
{% endblock %}
