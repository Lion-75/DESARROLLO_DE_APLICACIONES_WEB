{% extends "base.html" %}

{% block title %}Agregar Libro{% endblock %}

{% block content %}
<h2>Agregar Nuevo Libro</h2>
<form method="post" action="{{ url_for('agregar') }}">
    <label>Título:</label><br>
    <input type="text" name="titulo" required><br><br>
    <label>Autor:</label><br>
    <input type="text" name="autor" required><br><br>
    <label>Cantidad:</label><br>
    <input type="number" name="cantidad" required><br><br>
    <label>Precio:</label><br>
    <input type="number" step="0.01" name="precio" required><br><br>
    <label>Guardar en:</label><br>
    <select name="formato">
        <option value="txt">Archivo TXT</option>
        <option value="json">Archivo JSON</option>
        <option value="csv">Archivo CSV</option>
        <option value="sqlite">Base de datos SQLite</option>
    </select><br><br>
    <input type="submit" value="Guardar">
</form>
{% endblock %}
